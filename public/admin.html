<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Grow Halal</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="animate-fade">
    <header class="container">
        <nav>
            <div class="logo">Grow<span>Halal</span> <small
                    style="font-size: 0.7rem; color: var(--text-muted);">(Admin)</small></div>
            <button onclick="logout()" class="btn btn-link">Sign Out</button>
        </nav>
    </header>

    <main class="container" style="margin-top: 40px;">
        <div class="glass-card mb-4">
            <h1>Admin Dashboard</h1>
            <p style="color: var(--text-muted);">Manage members and system announcements.</p>
        </div>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 30px;">
            <section class="glass-card">
                <h3 style="margin-bottom: 24px; color: var(--primary-color);">Member List</h3>
                <div id="memberList" style="margin-bottom: 20px;">
                    <!-- Members will be listed here -->
                </div>
                <button class="btn btn-primary" style="width: 100%;">Add New Member</button>
            </section>

            <section class="glass-card">
                <h3 style="margin-bottom: 24px; color: var(--primary-color);">Create Announcement</h3>
                <form id="announcementForm">
                    <input type="text" id="annTitle" class="input-box" placeholder="Title" style="margin-bottom: 15px;"
                        required>
                    <textarea id="annDesc" class="input-box" placeholder="Detailed Description"
                        style="margin-bottom: 15px; height: 100px;" required></textarea>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Post Announcement</button>
                </form>
            </section>
        </div>
    </main>

    <footer class="container">
        <p>&copy; 2026 Grow Halal. Admin Dashboard.</p>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="app.js?v=3" defer></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Panel - Grow Halal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="animate-fade">
    <header class="container">
        <nav>
            <div class="logo">
                <img src="logo.png" alt="Grow Halal">
                Grow<span>Halal</span> <small
                    style="font-size: 0.7rem; color: var(--text-muted);">(Owner)</small></div>
            <button onclick="logout()" class="btn btn-link">Sign Out</button>
        </nav>
    </header>

    <main class="container" style="margin-top: 40px;">
        <div class="glass-card mb-4">
            <h1 style="margin-bottom: 10px;">Owner Dashboard</h1>
            <p style="color: var(--text-muted);">Manage administrators, managers, and system-wide settings.</p>
        </div>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 30px;">
            <!-- User Management -->
            <section class="glass-card">
                <h3 style="margin-bottom: 24px; color: var(--primary-color);">Member Management</h3>
                <div id="userList" style="margin-bottom: 24px; min-height: 100px;">
                    <!-- User items will be rendered here via JS -->
                    <p style="color: var(--text-muted); font-size: 0.9rem;">Loading user list...</p>
                </div>
                <button class="btn btn-primary" style="width: 100%;" onclick="openAddUserModal()">Add New
                    Member</button>
            </section>

            <!-- Role Management -->
            <section class="glass-card">
                <h3 style="margin-bottom: 24px; color: var(--primary-color);">System Roles</h3>
                <div class="form-group">
                    <label class="form-label">Update User Role</label>
                    <input type="email" id="targetEmail" class="input-box" placeholder="User Email"
                        style="margin-bottom: 12px;">
                    <select id="targetRole" class="input-box" style="margin-bottom: 12px; background: rgba(0,0,0,0.3);">
                        <option value="member">Member</option>
                        <option value="manager">Manager</option>
                        <option value="admin">Admin</option>
                        <option value="owner">Owner</option>
                    </select>
                    <button class="btn btn-primary" style="width: 100%;" onclick="updateUserRole()">Update Role</button>
                </div>
            </section>

            <!-- Announcements / Global Controls -->
            <section class="glass-card">
                <h3 style="margin-bottom: 24px; color: var(--primary-color);">Announcements</h3>
                <form id="ownerAnnouncement">
                    <input type="text" class="input-box" placeholder="Subject" style="margin-bottom: 12px;" required>
                    <textarea class="input-box" placeholder="Message content..."
                        style="margin-bottom: 12px; height: 80px;" required></textarea>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Post to All</button>
                </form>
            </section>
        </div>
    </main>

    <footer class="container">
        <p>&copy; 2026 Grow Halal. Owner Control Panel.</p>
    </footer>

    <!-- PDF Generation Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="app.js?v=6" defer></script>
</body>

</html>

<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>লগইন - Grow Halal</title>
    <link rel="stylesheet" href="style.css">
</head>

<body style="justify-content: center; align-items: center;">
    <div class="container" style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
        <div class="nm-card animate-fade-in" style="width: 100%; max-width: 400px; padding: 40px;">
            <div style="text-align: center; margin-bottom: 30px;">
                <h2 style="font-size: 2rem; color: var(--accent-color);">স্বাগতম</h2>
                <p style="color: var(--text-secondary);">আপনার অ্যাকাউন্টে লগইন করুন</p>
            </div>

            <form id="loginForm">
                <div style="margin-bottom: 25px;">
                    <label
                        style="display: block; margin-bottom: 10px; font-size: 0.9rem; color: var(--text-secondary);">ইমেইল
                        অ্যাড্রেস</label>
                    <input type="email" id="email" class="nm-input" placeholder="example@email.com" required>
                </div>
                <div style="margin-bottom: 30px;">
                    <label
                        style="display: block; margin-bottom: 10px; font-size: 0.9rem; color: var(--text-secondary);">পাসওয়ার্ড</label>
                    <input type="password" id="password" class="nm-input" placeholder="••••••••" required>
                </div>

                <button type="submit" class="nm-button"
                    style="width: 100%; margin-bottom: 20px; padding: 15px;">লগইন</button>

                <div id="loginError"
                    style="color: var(--error-color); font-size: 0.85rem; text-align: center; display: none;">
                    ইমেইল বা পাসওয়ার্ড ভুল।
                </div>
            </form>

            <div style="text-align: center; margin-top: 20px;">
                <a href="index.html" style="color: var(--text-secondary); text-decoration: none; font-size: 0.9rem;">←
                    মূল পেজে ফিরে যান</a>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="app.js" type="module"></script>
</body>

</html>
